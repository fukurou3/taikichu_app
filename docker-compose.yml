version: '3.8'

services:
  # Redis - 高速データストレージ
  redis:
    image: redis:7-alpine
    container_name: taikichu-redis-local
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Pub/Sub Emulator - Google Cloud Pub/Sub ローカル環境
  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    container_name: taikichu-pubsub-emulator
    ports:
      - "8085:8085"
    environment:
      - PUBSUB_PROJECT_ID=taikichu-app-c8dcd
    command: >
      bash -c "
        gcloud components install pubsub-emulator --quiet &&
        gcloud beta emulators pubsub start --host-port=0.0.0.0:8085 --project=taikichu-app-c8dcd
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Analytics Service - 統一パイプライン処理エンジン
  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: taikichu-analytics-service
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - PUBSUB_PROJECT_ID=taikichu-app-c8dcd
      - GOOGLE_APPLICATION_CREDENTIALS=/app/service-account.json
      - ENVIRONMENT=development
    depends_on:
      redis:
        condition: service_healthy
      pubsub-emulator:
        condition: service_healthy
    volumes:
      - ./analytics-service:/app
      - ./service-account.json:/app/service-account.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Firebase Functions Emulator - Firebase Functions ローカル環境
  firebase-emulator:
    image: node:18-alpine
    container_name: taikichu-firebase-emulator
    working_dir: /app
    ports:
      - "9099:9099"  # Firebase Auth Emulator
      - "8080:8080"  # Cloud Functions Emulator
      - "8000:8000"  # Firestore Emulator
      - "4000:4000"  # Firebase Emulator Suite UI
    environment:
      - FIRESTORE_EMULATOR_HOST=0.0.0.0:8000
      - FIREBASE_AUTH_EMULATOR_HOST=0.0.0.0:9099
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
    volumes:
      - .:/app
    command: >
      sh -c "
        npm install -g firebase-tools &&
        cd /app &&
        firebase emulators:start --only firestore,auth,functions,pubsub --host 0.0.0.0
      "
    depends_on:
      - pubsub-emulator

  # Nginx - リバースプロキシ（開発用）
  nginx:
    image: nginx:alpine
    container_name: taikichu-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - analytics-service
      - firebase-emulator
    restart: unless-stopped

volumes:
  redis_data:
    driver: local

networks:
  default:
    name: taikichu-network
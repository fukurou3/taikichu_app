# Cloud Run トラフィック制御・自動スケーリング設定
# SNSアプリに最適化された設定

# 1. Load Balancer設定（グローバル負荷分散）
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: taikichu-ssl-cert
spec:
  domains:
    - api.taikichu.app
    - analytics.taikichu.app
    - likes.taikichu.app

---
# 2. Cloud Armor セキュリティポリシー
apiVersion: compute.googleapis.com/v1
kind: SecurityPolicy
metadata:
  name: taikichu-security-policy
spec:
  description: "SNSアプリ向けセキュリティポリシー"
  rules:
  # DDoS攻撃対策
  - priority: 1000
    match:
      config:
        srcIpRanges: ["*"]
    action: "rate_based_ban"
    rateLimitOptions:
      rateLimitThreshold:
        count: 100  # 1分間に100リクエスト
        intervalSec: 60
      banThreshold:
        count: 1000  # 1分間に1000リクエストで一時ブロック
        intervalSec: 60
      banDurationSec: 300  # 5分間ブロック
  
  # ボット対策
  - priority: 2000
    match:
      expr:
        expression: 'request.headers["user-agent"].contains("bot") || request.headers["user-agent"].contains("crawler")'
    action: "throttle"
    rateLimitOptions:
      rateLimitThreshold:
        count: 10
        intervalSec: 60
  
  # API濫用対策
  - priority: 3000
    match:
      config:
        srcIpRanges: ["*"]
        paths: ["/like", "/unlike", "/follow", "/unfollow"]
    action: "rate_based_ban"
    rateLimitOptions:
      rateLimitThreshold:
        count: 60  # 1分間に60回のアクション制限
        intervalSec: 60
      banDurationSec: 600  # 10分間ブロック

---
# 3. Cloud Run サービス別スケーリング設定
apiVersion: v1
kind: ConfigMap
metadata:
  name: scaling-config
data:
  # いいねサービス（高頻度・低レイテンシ）
  like-service.yaml: |
    autoscaling:
      minScale: 2      # 常時2インスタンス待機
      maxScale: 500    # 最大500インスタンス
      targetConcurrency: 50  # 1インスタンス50同時接続
      targetUtilization: 70  # CPU使用率70%でスケール
    
    resources:
      cpu: "2000m"     # 2vCPU
      memory: "1Gi"    # 1GB RAM
      timeout: "30s"   # 30秒タイムアウト
    
    health:
      livenessProbe:
        path: "/health"
        initialDelaySeconds: 5
        periodSeconds: 10
      readinessProbe:
        path: "/health"
        initialDelaySeconds: 3
        periodSeconds: 5

  # ファンアウトサービス（バースト対応）
  fanout-service.yaml: |
    autoscaling:
      minScale: 0      # 使用時のみ起動
      maxScale: 200    # 大量フォロワー対応
      targetConcurrency: 20  # 1インスタンス20同時接続
      targetUtilization: 60
    
    resources:
      cpu: "1000m"     # 1vCPU
      memory: "512Mi"  # 512MB RAM
      timeout: "120s"  # 2分タイムアウト（ファンアウト処理時間考慮）
    
    health:
      livenessProbe:
        path: "/health"
        initialDelaySeconds: 10
        periodSeconds: 30

  # アナリティクスサービス（中程度負荷）
  analytics-service.yaml: |
    autoscaling:
      minScale: 1      # 常時1インスタンス
      maxScale: 100    # 中程度スケール
      targetConcurrency: 80
      targetUtilization: 75
    
    resources:
      cpu: "1000m"
      memory: "1Gi"
      timeout: "60s"
    
    health:
      livenessProbe:
        path: "/health"
        initialDelaySeconds: 15
        periodSeconds: 30

---
# 4. 地域別トラフィック分散設定
apiVersion: v1
kind: ConfigMap
metadata:
  name: regional-config
data:
  regions.yaml: |
    # プライマリリージョン（日本）
    primary:
      region: "asia-northeast1"
      weight: 80
      services:
        - like-service
        - fanout-service
        - analytics-service
    
    # セカンダリリージョン（シンガポール）
    secondary:
      region: "asia-southeast1"
      weight: 20
      services:
        - analytics-service  # 読み込み系のみ
    
    # 災害時フェイルオーバー（米国）
    failover:
      region: "us-central1"
      weight: 0
      services:
        - analytics-service

---
# 5. アラート・監視設定
apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-config
data:
  alerts.yaml: |
    # レスポンス時間アラート
    latency_alerts:
      - service: "like-service"
        threshold: "100ms"      # 100ms以上でアラート
        severity: "warning"
      - service: "fanout-service"
        threshold: "500ms"
        severity: "warning"
      - service: "analytics-service"
        threshold: "200ms"
        severity: "warning"
    
    # エラー率アラート
    error_rate_alerts:
      - service: "*"
        threshold: "1%"         # エラー率1%以上
        severity: "critical"
    
    # スケール限界アラート
    scaling_alerts:
      - service: "like-service"
        max_instances_threshold: 400  # 400インスタンス到達
        severity: "critical"
      - service: "fanout-service"
        max_instances_threshold: 150
        severity: "warning"
    
    # CPU使用率アラート
    cpu_alerts:
      - service: "*"
        threshold: "85%"        # CPU使用率85%以上
        severity: "warning"
    
    # メモリ使用率アラート
    memory_alerts:
      - service: "*"
        threshold: "90%"        # メモリ使用率90%以上
        severity: "critical"

---
# 6. コスト最適化設定
apiVersion: v1
kind: ConfigMap
metadata:
  name: cost-optimization
data:
  optimization.yaml: |
    # 時間帯別スケーリング（日本時間基準）
    schedule_scaling:
      # 平日ピーク時間（12:00-13:00, 18:00-22:00）
      peak_hours:
        times: ["12:00-13:00", "18:00-22:00"]
        days: ["mon", "tue", "wed", "thu", "fri"]
        scaling_multiplier: 1.5
      
      # 週末（土日）
      weekend:
        days: ["sat", "sun"]
        scaling_multiplier: 1.2
      
      # 深夜・早朝（01:00-06:00）
      low_traffic:
        times: ["01:00-06:00"]
        scaling_multiplier: 0.3
    
    # リソース最適化
    resource_optimization:
      # Cold Startを考慮した設定
      cold_start_optimization:
        min_instances_during_peak: true
        preemptible_instances: false  # SNSは可用性重視
      
      # コンテナ最適化
      container_optimization:
        enable_cpu_throttling: false   # 応答性重視
        memory_limit_strict: true
        startup_probe_enabled: true

---
# 7. 災害復旧設定
apiVersion: v1
kind: ConfigMap
metadata:
  name: disaster-recovery
data:
  dr_config.yaml: |
    # 自動フェイルオーバー設定
    failover:
      primary_region_health_check:
        interval: "30s"
        timeout: "10s"
        failure_threshold: 3
      
      secondary_region_activation:
        automatic: true
        rto: "5m"           # 復旧時間目標：5分
        rpo: "1m"           # 復旧ポイント目標：1分
      
      data_consistency:
        redis_replication: true
        firestore_backup: true
        cross_region_sync: true
    
    # 障害シナリオ別対応
    scenarios:
      - name: "region_outage"
        trigger: "primary_region_down"
        action: "activate_secondary_region"
        notification: "critical"
      
      - name: "service_degradation"
        trigger: "error_rate_high"
        action: "increase_instances"
        notification: "warning"
      
      - name: "traffic_spike"
        trigger: "request_volume_high"
        action: "auto_scale_all_services"
        notification: "info"
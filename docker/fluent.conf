# Fluentd設定 - 統合ログ管理
# =====================================

<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# Docker コンテナログ収集
<source>
  @type tail
  path /var/log/containers/*.log
  pos_file /var/log/fluentd-containers.log.pos
  tag docker.*
  format json
  time_key time
  time_format %Y-%m-%dT%H:%M:%S.%NZ
</source>

# Analytics Service ログ
<filter docker.analytics-service>
  @type record_transformer
  <record>
    service analytics-service
    environment "#{ENV['ENVIRONMENT'] || 'development'}"
  </record>
</filter>

# Redis ログ
<filter docker.redis>
  @type record_transformer
  <record>
    service redis
    environment "#{ENV['ENVIRONMENT'] || 'development'}"
  </record>
</filter>

# Firebase Emulator ログ
<filter docker.firebase-emulator>
  @type record_transformer
  <record>
    service firebase-emulator
    environment "#{ENV['ENVIRONMENT'] || 'development'}"
  </record>
</filter>

# エラーログの強調
<filter docker.**>
  @type grep
  <regexp>
    key log
    pattern /ERROR|FATAL|Exception/i
  </regexp>
  add_tag_prefix error
</filter>

# 出力設定
<match docker.**>
  @type copy
  
  # ファイル出力
  <store>
    @type file
    path /var/log/docker
    append true
    time_slice_format %Y%m%d
    time_slice_wait 10m
    time_format %Y%m%dT%H%M%S%z
    buffer_type file
    buffer_path /var/log/buffer
    flush_interval 30s
  </store>
  
  # 標準出力（開発用）
  <store>
    @type stdout
    output_type json
  </store>
</match>

# エラーログは別途記録
<match error.docker.**>
  @type file
  path /var/log/errors
  append true
  time_slice_format %Y%m%d
  time_slice_wait 10m
  time_format %Y%m%dT%H%M%S%z
  buffer_type file
  buffer_path /var/log/error_buffer
  flush_interval 10s
</match>